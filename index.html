<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpecial Cloud - Gestión Docente</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y dependencias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF para exportar informes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Lucide Icons para navegador -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Cargamos Firebase como módulos globales primero -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB = {
            initializeApp, getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc,
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [user, setUser] = useState(null);
          const [students, setStudents] = useState([]);
          const [view, setView] = useState('dashboard');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [searchTerm, setSearchTerm] = useState('');
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          const [formData, setFormData] = useState({
            name: '',
            age: '',
            grade: '',
            diagnosis: '',
            observations: ''
          });

          // CONFIGURACIÓN DE FIREBASE
          // Si estás en GitHub, rellena estos datos con los de tu consola de Firebase
          const manualConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
          };

          useEffect(() => {
            const startApp = async () => {
              try {
                // Intentar obtener config del entorno o usar la manual
                let config;
                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                } else {
                    config = manualConfig;
                }

                if (!config.apiKey || config.apiKey === "TU_API_KEY") {
                  setError("Falta la configuración de Firebase. Por favor, edita el archivo index.html con tus credenciales de Firebase.");
                  setLoading(false);
                  return;
                }

                const app = window.FB.initializeApp(config);
                const auth = window.FB.getAuth(app);
                const db = window.FB.getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'maestra-especial-app';

                // Guardar referencias en window para uso posterior
                window.currentDb = db;
                window.currentAppId = appId;

                // Auth
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await window.FB.signInAnonymously(auth);
                }

                window.FB.onAuthStateChanged(auth, (currentUser) => {
                  setUser(currentUser);
                  setLoading(false);
                  
                  if (currentUser) {
                    // Cargar datos
                    const studentsRef = window.FB.collection(db, 'artifacts', appId, 'users', currentUser.uid, 'students');
                    window.FB.onSnapshot(window.FB.query(studentsRef), (snapshot) => {
                      setStudents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                  }
                });

              } catch (err) {
                console.error(err);
                setError("Error al conectar con Firebase: " + err.message);
                setLoading(false);
              }
            };

            if (window.FB) {
              startApp();
            } else {
              // Reintento si el módulo no ha cargado aún
              setTimeout(startApp, 1000);
            }
          }, []);

          useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
          }, [view, students, isModalOpen, loading, error]);

          const handleAddStudent = async (e) => {
            e.preventDefault();
            if (!user || !window.currentDb) return;
            try {
              const studentsRef = window.FB.collection(window.currentDb, 'artifacts', window.currentAppId, 'users', user.uid, 'students');
              await window.FB.addDoc(studentsRef, {
                ...formData,
                createdAt: new Date().toISOString(),
                status: 'activo'
              });
              setIsModalOpen(false);
              setFormData({ name: '', age: '', grade: '', diagnosis: '', observations: '' });
            } catch (error) {
              console.error("Error al guardar:", error);
            }
          };

          const handleDelete = async (id) => {
            if (!window.confirm("¿Eliminar este registro?")) return;
            try {
              const docRef = window.FB.doc(window.currentDb, 'artifacts', window.currentAppId, 'users', user.uid, 'students', id);
              await window.FB.deleteDoc(docRef);
            } catch (error) {
              console.error(error);
            }
          };

          if (loading) return (
            <div className="h-screen flex flex-col items-center justify-center gap-4">
              <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
              <p className="text-slate-500 font-medium">Iniciando EduSpecial...</p>
            </div>
          );

          if (error) return (
            <div className="h-screen flex items-center justify-center p-6 text-center">
              <div className="bg-red-50 p-8 rounded-3xl border border-red-200 max-w-md">
                <i data-lucide="alert-circle" className="mx-auto mb-4 text-red-500 w-12 h-12"></i>
                <h2 className="text-xl font-bold text-red-800 mb-2">Atención</h2>
                <p className="text-red-600 mb-4">{error}</p>
                <p className="text-xs text-red-400 italic">Si estás en GitHub, recuerda que debes crear un proyecto en Firebase y poner tus llaves en el código.</p>
              </div>
            </div>
          );

          const filteredStudents = students.filter(s => 
            s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            s.diagnosis.toLowerCase().includes(searchTerm.toLowerCase())
          );

          return (
            <div className="min-h-screen pb-20 md:pb-0">
              <nav className="bg-indigo-700 text-white shadow-xl sticky top-0 z-40 p-4">
                <div className="max-w-6xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <i data-lucide="cloud"></i>
                    <span className="font-bold text-xl">EduSpecial Cloud</span>
                  </div>
                  <button onClick={() => setIsModalOpen(true)} className="bg-white text-indigo-700 px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-all hover:scale-105 shadow-lg">
                    <i data-lucide="plus" className="w-4 h-4"></i> Nuevo
                  </button>
                </div>
              </nav>

              <main className="max-w-6xl mx-auto px-4 py-8">
                {view === 'dashboard' ? (
                  <div className="animate-in fade-in">
                    <header className="mb-10">
                      <h2 className="text-3xl font-extrabold text-slate-900">Bienvenido 👋</h2>
                      <p className="text-slate-500">Gestión de alumnos en la nube.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div onClick={() => setView('students')} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-500 transition-all group">
                        <i data-lucide="users" className="w-10 h-10 text-indigo-600 mb-4 group-hover:scale-110 transition-transform"></i>
                        <h3 className="text-xl font-bold mb-1">Mis Alumnos</h3>
                        <p className="text-slate-400 text-sm">Tienes {students.length} alumnos registrados.</p>
                      </div>
                      <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 opacity-50">
                        <i data-lucide="calendar" className="w-10 h-10 text-slate-400 mb-4"></i>
                        <h3 className="text-xl font-bold mb-1">Próximas Sesiones</h3>
                        <p className="text-slate-400 text-sm">Módulo en desarrollo.</p>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="animate-in slide-in-from-right-4">
                    <div className="flex items-center gap-4 mb-8">
                        <button onClick={() => setView('dashboard')} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-2xl font-bold text-slate-800">Listado de Alumnos</h2>
                    </div>
                    <div className="mb-6 relative">
                        <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Buscar por nombre o diagnóstico..." className="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm" value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {filteredStudents.map(s => (
                        <div key={s.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all">
                          <div className="flex justify-between items-start mb-2">
                            <h3 className="font-bold text-lg text-slate-900">{s.name}</h3>
                            <button onClick={() => handleDelete(s.id)} className="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                          </div>
                          <p className="text-xs text-indigo-600 font-bold mb-3 bg-indigo-50 inline-block px-2 py-1 rounded-md">{s.grade}</p>
                          <p className="text-sm text-slate-600 line-clamp-2 mb-4">{s.diagnosis}</p>
                          <div className="pt-4 border-t flex gap-2">
                            <button className="flex-1 text-xs font-bold py-2 rounded-lg bg-slate-100 hover:bg-slate-200 transition-colors">VER MÁS</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </main>

              {/* Modal Registro */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                  <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl animate-in zoom-in-95">
                    <div className="p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-bold text-slate-900">Registrar Alumno</h3>
                            <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
                        </div>
                        <form onSubmit={handleAddStudent} className="space-y-4">
                            <input placeholder="Nombre Completo" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-transparent focus:border-indigo-100 transition-all" value={formData.name} onChange={(e)=>setFormData({...formData, name: e.target.value})} />
                            <div className="flex gap-4">
                                <input placeholder="Edad" type="number" className="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-transparent focus:border-indigo-100 transition-all" value={formData.age} onChange={(e)=>setFormData({...formData, age: e.target.value})} />
                                <input placeholder="Grado" className="w-1/2 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-transparent focus:border-indigo-100 transition-all" value={formData.grade} onChange={(e)=>setFormData({...formData, grade: e.target.value})} />
                            </div>
                            <input placeholder="Diagnóstico" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-transparent focus:border-indigo-100 transition-all" value={formData.diagnosis} onChange={(e)=>setFormData({...formData, diagnosis: e.target.value})} />
                            <textarea placeholder="Observaciones generales" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-transparent focus:border-indigo-100 transition-all" rows="3" value={formData.observations} onChange={(e)=>setFormData({...formData, observations: e.target.value})} />
                            <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">Guardar en la Nube</button>
                        </form>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
