<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpecial Cloud - Gestión Docente</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y dependencias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF para exportar informes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Lucide Icons para navegador -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Cargamos Firebase como módulos globales primero -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Exponer a la ventana global para que el script de Babel pueda acceder a ellos
        window.FB = {
            initializeApp, getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc,
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [user, setUser] = useState(null);
          const [students, setStudents] = useState([]);
          const [view, setView] = useState('dashboard');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [searchTerm, setSearchTerm] = useState('');
          const [loading, setLoading] = useState(true);

          const [formData, setFormData] = useState({
            name: '',
            age: '',
            grade: '',
            diagnosis: '',
            observations: ''
          });

          // Acceso a Firebase desde el objeto global window.FB
          // Nota: Asegúrate de que las variables de entorno estén configuradas en tu entorno local o de producción
          const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
          const app = window.FB.initializeApp(firebaseConfig);
          const auth = window.FB.getAuth(app);
          const db = window.FB.getFirestore(app);
          const appId = typeof __app_id !== 'undefined' ? __app_id : 'maestra-especial-app';

          // Efecto para inicializar los iconos de Lucide cada vez que cambia la vista o el estado
          useEffect(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
          }, [view, students, isModalOpen, loading]);

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await window.FB.signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Error de auth:", error);
              }
            };
            initAuth();

            const unsubscribe = window.FB.onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const studentsRef = window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'students');
            const q = window.FB.query(studentsRef);
            const unsubscribe = window.FB.onSnapshot(q, (snapshot) => {
              const studentData = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
              }));
              setStudents(studentData);
            }, (error) => {
              console.error("Error al obtener datos:", error);
            });
            return () => unsubscribe();
          }, [user]);

          const handleAddStudent = async (e) => {
            e.preventDefault();
            if (!user) return;
            try {
              const studentsRef = window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'students');
              await window.FB.addDoc(studentsRef, {
                ...formData,
                createdAt: new Date().toISOString(),
                status: 'activo'
              });
              setIsModalOpen(false);
              setFormData({ name: '', age: '', grade: '', diagnosis: '', observations: '' });
            } catch (error) {
              console.error("Error al guardar:", error);
            }
          };

          const handleDelete = async (id) => {
            if (!window.confirm("¿Eliminar este registro permanentemente?")) return;
            try {
              const docRef = window.FB.doc(db, 'artifacts', appId, 'users', user.uid, 'students', id);
              await window.FB.deleteDoc(docRef);
            } catch (error) {
              console.error("Error al eliminar:", error);
            }
          };

          const exportAllToCSV = () => {
            if (students.length === 0) return;
            const headers = ["Nombre", "Edad", "Grado", "Diagnóstico", "Observaciones", "Fecha Registro"];
            const rows = students.map(s => [
              s.name, s.age, s.grade, s.diagnosis,
              `"${(s.observations || "").replace(/"/g, '""')}"`,
              s.createdAt
            ]);
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Alumnos_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const exportToPDF = (student) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const date = new Date().toLocaleDateString();

            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(63, 81, 181); 
            doc.text("INFORME DE SEGUIMIENTO ESCOLAR", 20, 30);
            doc.setDrawColor(200, 200, 200);
            doc.line(20, 35, 190, 35);

            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text(`Fecha: ${date}`, 20, 45);

            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text("DATOS DEL ALUMNO", 20, 60);
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(12);
            doc.text(`Nombre: ${student.name}`, 20, 70);
            doc.text(`Edad: ${student.age} años`, 20, 78);
            doc.text(`Grado: ${student.grade}`, 20, 86);
            doc.text(`Diagnóstico: ${student.diagnosis}`, 20, 94);

            doc.setFont("helvetica", "bold");
            doc.text("OBSERVACIONES:", 20, 110);
            doc.setFont("helvetica", "normal");
            const splitText = doc.splitTextToSize(student.observations || "Sin observaciones.", 170);
            doc.text(splitText, 20, 118);

            doc.save(`Informe_${student.name.replace(/\s+/g, '_')}.pdf`);
          };

          const copyToClipboard = (student) => {
            const text = `INFORME\nAlumno: ${student.name}\nDiagnóstico: ${student.diagnosis}\nGrado: ${student.grade}\nObs: ${student.observations || 'N/A'}`;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copiado al portapapeles");
            });
          };

          if (loading) return <div className="h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>;

          const filteredStudents = students.filter(s => 
            s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            s.diagnosis.toLowerCase().includes(searchTerm.toLowerCase())
          );

          return (
            <div className="min-h-screen pb-20 md:pb-0">
              <nav className="bg-indigo-700 text-white shadow-xl sticky top-0 z-40 p-4">
                <div className="max-w-6xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <i data-lucide="users"></i>
                    <span className="font-bold text-xl">EduSpecial Cloud</span>
                  </div>
                  <button onClick={() => setIsModalOpen(true)} className="bg-white text-indigo-700 px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-all hover:scale-105">
                    <i data-lucide="plus" className="w-4 h-4"></i> Nuevo Alumno
                  </button>
                </div>
              </nav>

              <main className="max-w-6xl mx-auto px-4 py-8">
                {view === 'dashboard' && (
                  <div className="animate-in fade-in">
                    <header className="mb-10">
                      <h2 className="text-3xl font-extrabold text-slate-900">Hola de nuevo 👋</h2>
                      <p className="text-slate-500">Panel de control de alumnos.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold uppercase text-slate-400">Total Alumnos</p>
                        <p className="text-4xl font-black text-indigo-600">{students.length}</p>
                      </div>
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold uppercase text-slate-400">Estado Nube</p>
                        <p className="text-sm font-bold text-emerald-600 mt-2">Sincronizado ✅</p>
                      </div>
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold uppercase text-slate-400">Exportaciones</p>
                        <p className="text-sm font-bold text-slate-600 mt-2">CSV y PDF habilitados</p>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                        <button onClick={() => setView('students')} className="p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-400 transition">
                            <i data-lucide="users" className="mx-auto mb-2 text-indigo-600"></i>
                            <span className="block text-sm font-bold">Ver Alumnos</span>
                        </button>
                        <button onClick={exportAllToCSV} className="p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-emerald-400 transition">
                            <i data-lucide="table" className="mx-auto mb-2 text-emerald-600"></i>
                            <span className="block text-sm font-bold">Excel General</span>
                        </button>
                    </div>
                  </div>
                )}

                {view === 'students' && (
                  <div className="animate-in slide-in-from-bottom-4">
                    <div className="flex flex-col md:flex-row justify-between mb-8 gap-4">
                      <h2 className="text-2xl font-bold text-slate-800">Listado de Alumnos</h2>
                      <div className="relative">
                        <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Buscar..." className="pl-10 pr-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} />
                      </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {filteredStudents.map(s => (
                        <div key={s.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative group hover:shadow-md transition-shadow">
                          <button onClick={() => handleDelete(s.id)} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                          <h3 className="font-bold text-lg text-slate-900">{s.name}</h3>
                          <p className="text-xs text-slate-500 mb-2">{s.grade} • {s.age} años</p>
                          <p className="text-sm font-medium bg-indigo-50 text-indigo-700 p-2 rounded-lg mb-4 line-clamp-2">{s.diagnosis}</p>
                          <div className="flex gap-2">
                            <button onClick={()=>copyToClipboard(s)} className="flex-1 py-2 bg-slate-100 rounded-lg text-xs font-bold flex items-center justify-center gap-1 hover:bg-slate-200 transition-colors"><i data-lucide="copy" className="w-3 h-3"></i> Copiar</button>
                            <button onClick={()=>exportToPDF(s)} className="flex-1 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold flex items-center justify-center gap-1 hover:bg-indigo-700 transition-colors"><i data-lucide="file-down" className="w-3 h-3"></i> PDF</button>
                          </div>
                        </div>
                      ))}
                      {filteredStudents.length === 0 && (
                        <div className="col-span-full py-20 text-center text-slate-400 italic">No se encontraron resultados.</div>
                      )}
                    </div>
                  </div>
                )}
              </main>

              {/* Botones Navegación Móvil */}
              <div className="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50">
                <button onClick={() => setView('dashboard')} className={view === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}><i data-lucide="layout-dashboard"></i></button>
                <button onClick={() => setView('students')} className={view === 'students' ? 'text-indigo-600' : 'text-slate-400'}><i data-lucide="users"></i></button>
              </div>

              {/* Modal Registro */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                  <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl animate-in zoom-in-95">
                    <div className="bg-indigo-600 p-4 text-white flex justify-between items-center">
                      <h3 className="font-bold">Nuevo Alumno</h3>
                      <button onClick={() => setIsModalOpen(false)} className="hover:bg-indigo-500 p-1 rounded-full"><i data-lucide="x"></i></button>
                    </div>
                    <form onSubmit={handleAddStudent} className="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Nombre Completo</label>
                        <input placeholder="Ej: Juan Pérez" required className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={formData.name} onChange={(e)=>setFormData({...formData, name: e.target.value})} />
                      </div>
                      <div className="flex gap-2">
                        <div className="w-1/2">
                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Edad</label>
                            <input placeholder="Años" type="number" className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={formData.age} onChange={(e)=>setFormData({...formData, age: e.target.value})} />
                        </div>
                        <div className="w-1/2">
                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Grado</label>
                            <input placeholder="Ej: 3ro B" className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={formData.grade} onChange={(e)=>setFormData({...formData, grade: e.target.value})} />
                        </div>
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Diagnóstico</label>
                        <input placeholder="Diagnóstico principal" className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={formData.diagnosis} onChange={(e)=>setFormData({...formData, diagnosis: e.target.value})} />
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Observaciones</label>
                        <textarea placeholder="Notas adicionales..." className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" rows="3" value={formData.observations} onChange={(e)=>setFormData({...formData, observations: e.target.value})} />
                      </div>
                      <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-colors">Guardar en la Nube</button>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
