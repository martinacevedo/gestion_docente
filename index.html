<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpecial Cloud - Gestión Docente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Exponemos las funciones necesarias al objeto global window
        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [view, setView] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);

            // Configuración verificada según tus capturas de pantalla
            const firebaseConfig = {
                apiKey: "AIzaSyBCLcf1OE1sPFo7zv7Ki5seIpGtcciRrhY",
                authDomain: "eduspecial-424ce.firebaseapp.com",
                projectId: "eduspecial-424ce",
                storageBucket: "eduspecial-424ce.firebasestorage.app",
                messagingSenderId: "866546155670",
                appId: "1:866546155670:web:e023c6cfebf94341ac42b7"
            };

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FB) return;
                    
                    try {
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const db = window.FB.getFirestore(app);
                        
                        window.FB.onAuthStateChanged(auth, async (currUser) => {
                            try {
                                if (!currUser) {
                                    await window.FB.signInAnonymously(auth);
                                } else {
                                    setUser(currUser);
                                    const q = window.FB.collection(db, "students");
                                    window.FB.onSnapshot(q, (snapshot) => {
                                        setStudents(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                                        setLoading(false);
                                    }, (err) => {
                                        console.warn("Firestore restringido:", err);
                                        setLoading(false);
                                    });
                                }
                            } catch (signInErr) {
                                console.error("Error de autenticación:", signInErr);
                                setErrorMsg("La autenticación falló. Asegúrate de activar 'Anónimo' en la consola de Firebase.");
                                setLoading(false);
                            }
                        });
                    } catch (e) {
                        setErrorMsg("Error al inicializar Firebase.");
                        setLoading(false);
                    }
                };
                
                const timer = setTimeout(initFirebase, 1000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, isModalOpen, students, loading, errorMsg]);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-400 font-bold tracking-widest text-[10px] uppercase italic">Iniciando sistema...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-slate-200">
                        <div className="flex items-center gap-2 text-indigo-700">
                            <i data-lucide="brain-circuit" className="w-6 h-6"></i>
                            <span className="font-extrabold text-xl tracking-tight">EduSpecial</span>
                        </div>
                        <div className="flex items-center gap-4">
                            {errorMsg && <span className="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded font-bold">MODO OFFLINE</span>}
                            <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                                + Nuevo Alumno
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-6 lg:p-12">
                        {errorMsg && (
                            <div className="mb-8 p-4 bg-amber-50 border border-amber-200 rounded-2xl flex items-center gap-3 text-amber-700 text-sm">
                                <i data-lucide="alert-triangle" className="w-5 h-5"></i>
                                <p><strong>Configuración pendiente:</strong> Ve a Authentication > Sign-in method y activa "Anónimo".</p>
                            </div>
                        )}

                        {view === 'dashboard' ? (
                            <div className="space-y-10 animate-in">
                                <header>
                                    <h1 className="text-5xl font-black text-slate-900 tracking-tighter mb-2">Panel Maestro</h1>
                                    <p className="text-slate-500 text-lg">Control centralizado de alumnos y progresos.</p>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div onClick={() => setView('list')} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-500 transition-all group">
                                        <div className="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mb-8 group-hover:scale-110 transition-transform">
                                            <i data-lucide="users" className="text-indigo-600 w-8 h-8"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold mb-2">Mis Alumnos</h3>
                                        <p className="text-slate-400">Vea el listado completo de sus {students.length} alumnos.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 opacity-50">
                                        <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mb-8">
                                            <i data-lucide="layout" className="text-slate-400 w-8 h-8"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold mb-2">Reportes</h3>
                                        <p className="text-slate-400 italic">Próximamente disponible.</p>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in">
                                <button onClick={() => setView('dashboard')} className="flex items-center gap-2 text-slate-400 font-bold hover:text-indigo-600 transition-colors uppercase text-[10px] tracking-widest">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i> Volver al panel
                                </button>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tight">Listado de Alumnos</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {students.map(s => (
                                        <div key={s.id} className="bg-white p-8 rounded-[2.2rem] border border-slate-200 flex justify-between items-center shadow-sm">
                                            <div>
                                                <p className="font-extrabold text-xl text-slate-900 mb-2">{s.name}</p>
                                                <div className="flex gap-2">
                                                    <span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg uppercase tracking-widest">{s.grade}</span>
                                                    <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg uppercase tracking-widest">{s.diagnosis}</span>
                                                </div>
                                            </div>
                                            <i data-lucide="chevron-right" className="text-slate-200"></i>
                                        </div>
                                    ))}
                                    {students.length === 0 && (
                                        <div className="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-[2rem]">
                                            <p className="text-slate-300 italic">No hay alumnos registrados aún.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] w-full max-w-lg p-10 shadow-2xl animate-in">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="text-3xl font-black text-slate-900 tracking-tight">Nuevo Registro</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-300 hover:text-slate-600"><i data-lucide="x"></i></button>
                                </div>
                                <form className="space-y-6" onSubmit={(e) => {
                                    e.preventDefault();
                                    const data = {
                                        name: e.target.name.value,
                                        grade: e.target.grade.value,
                                        diagnosis: e.target.diag.value,
                                        createdAt: new Date().toISOString()
                                    };
                                    if (window.FB && user && !errorMsg) {
                                        const db = window.FB.getFirestore();
                                        window.FB.addDoc(window.FB.collection(db, "students"), data);
                                    } else {
                                        setStudents([...students, {id: Date.now(), ...data}]);
                                    }
                                    setIsModalOpen(false);
                                }}>
                                    <input name="name" required className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100" placeholder="Nombre completo del alumno" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="grade" required className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100" placeholder="Grado/Año" />
                                        <input name="diag" required className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-indigo-100" placeholder="Diagnóstico" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest">
                                        Registrar Alumno
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
