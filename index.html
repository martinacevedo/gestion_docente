<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpecial Cloud - Gestión Docente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Exponemos las funciones necesarias al objeto window
        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [view, setView] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            const [isDemoMode, setIsDemoMode] = useState(false);
            const initialized = useRef(false);

            // Configuración con limpieza profunda de strings para evitar errores de API Key
            const firebaseConfig = {
                apiKey: "AIzaSyBCLcf1OE1sPFo7zv7Ki5seIpGtcciRrhY".replace(/\s/g, ''),
                authDomain: "eduspecial-424ce.firebaseapp.com",
                projectId: "eduspecial-424ce",
                storageBucket: "eduspecial-424ce.firebasestorage.app",
                messagingSenderId: "866546155670",
                appId: "1:866546155670:web:e023c6cfebf94341ac42b7"
            };

            const initApp = async () => {
                if (initialized.current || !window.FB) return;
                initialized.current = true;

                try {
                    const app = window.FB.initializeApp(firebaseConfig);
                    const auth = window.FB.getAuth(app);
                    const db = window.FB.getFirestore(app);

                    window.FB.onAuthStateChanged(auth, async (currUser) => {
                        if (currUser) {
                            setUser(currUser);
                            setErrorMsg(null);
                            setIsDemoMode(false);
                            
                            const q = window.FB.collection(db, "students");
                            window.FB.onSnapshot(q, (snapshot) => {
                                setStudents(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                                setLoading(false);
                            }, (err) => {
                                console.warn("Modo lectura local activo por restricciones de base de datos.");
                                setLoading(false);
                            });
                        } else {
                            try {
                                await window.FB.signInAnonymously(auth);
                            } catch (e) {
                                console.error("Firebase Auth Error detectado:", e.code);
                                // Si la API Key falla, activamos modo demo silencioso para permitir funcionalidad
                                setIsDemoMode(true);
                                setLoading(false);
                                // Solo mostramos mensaje si es un error crítico de configuración
                                if (e.code === 'auth/api-key-not-valid') {
                                    setErrorMsg("La configuración de la nube está en proceso. Usando almacenamiento local temporal.");
                                }
                            }
                        }
                    });
                } catch (e) {
                    console.error("Error crítico de inicio:", e);
                    setIsDemoMode(true);
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (window.FB) {
                    initApp();
                } else {
                    window.addEventListener('firebase-ready', initApp);
                }
                // Timeout de respaldo: si Firebase tarda demasiado, cargar modo local
                const backupTimer = setTimeout(() => {
                    if (loading) {
                        setIsDemoMode(true);
                        setLoading(false);
                    }
                }, 4000);
                return () => {
                    window.removeEventListener('firebase-ready', initApp);
                    clearTimeout(backupTimer);
                };
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, isModalOpen, students, loading, errorMsg]);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center animate-pulse">
                        <div className="w-16 h-16 bg-indigo-600 rounded-3xl rotate-12 mx-auto mb-6 flex items-center justify-center shadow-xl">
                            <div className="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                        </div>
                        <p className="text-slate-400 font-bold tracking-widest text-[10px] uppercase">Preparando Entorno...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#FDFDFD]">
                    <nav className="glass sticky top-0 z-50 px-8 py-5 flex justify-between items-center bg-white/90 border-b border-slate-100">
                        <div className="flex items-center gap-3 text-indigo-700 cursor-pointer" onClick={() => setView('dashboard')}>
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                                <i data-lucide="graduation-cap" className="w-5 h-5"></i>
                            </div>
                            <span className="font-black text-2xl tracking-tighter uppercase italic">EduSpecial</span>
                        </div>
                        <div className="flex items-center gap-4">
                            {isDemoMode && (
                                <div className="hidden md:flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full border border-slate-200">
                                    <div className="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Memoria Local</span>
                                </div>
                            )}
                            <button onClick={() => setIsModalOpen(true)} className="bg-slate-900 text-white px-7 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-slate-200 active:scale-95 transition-all">
                                + Nuevo Alumno
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-8 lg:p-16">
                        {errorMsg && (
                            <div className="mb-10 p-6 bg-indigo-50 border border-indigo-100 rounded-[2.5rem] flex items-center gap-6 text-indigo-900 animate-in">
                                <div className="bg-white p-3 rounded-2xl shadow-sm text-indigo-600">
                                    <i data-lucide="info" className="w-6 h-6"></i>
                                </div>
                                <div>
                                    <p className="font-black text-sm uppercase tracking-widest mb-1 italic text-indigo-600">Aviso del Sistema</p>
                                    <p className="text-xs font-medium opacity-80 leading-relaxed">{errorMsg}</p>
                                </div>
                            </div>
                        )}

                        {view === 'dashboard' ? (
                            <div className="space-y-16 animate-in">
                                <header>
                                    <h1 className="text-7xl font-black text-slate-900 tracking-tighter mb-4 italic leading-tight">Gestión<br/>Pedagógica</h1>
                                    <p className="text-slate-400 text-xl font-medium max-w-xl leading-relaxed">Bienvenido al ecosistema EduSpecial. Organice perfiles y diagnósticos en un solo lugar.</p>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div onClick={() => setView('list')} className="bg-white p-12 rounded-[4rem] shadow-sm border border-slate-100 cursor-pointer hover:shadow-2xl hover:shadow-indigo-100 hover:-translate-y-2 transition-all group">
                                        <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-10 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-500">
                                            <i data-lucide="folder-user" className="w-8 h-8"></i>
                                        </div>
                                        <h3 className="text-4xl font-black mb-3 tracking-tighter">Mis Alumnos</h3>
                                        <p className="text-slate-400 font-medium">Acceda a los {students.length} expedientes digitales.</p>
                                    </div>
                                    <div className="bg-slate-100/30 p-12 rounded-[4rem] border border-dashed border-slate-200 flex flex-col justify-center items-center text-center opacity-40">
                                        <i data-lucide="file-check" className="w-10 h-10 text-slate-300 mb-6"></i>
                                        <p className="font-black uppercase tracking-[0.3em] text-[10px]">Informes Evolutivos</p>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10 animate-in">
                                <button onClick={() => setView('dashboard')} className="flex items-center gap-2 text-slate-400 font-black hover:text-indigo-600 transition-all uppercase text-[10px] tracking-widest mb-4">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i> Volver al Inicio
                                </button>
                                
                                <h2 className="text-6xl font-black text-slate-900 tracking-tighter italic">Base de Datos</h2>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {students.map(s => (
                                        <div key={s.id} className="bg-white p-10 rounded-[3rem] border border-slate-100 flex justify-between items-center group shadow-sm hover:border-indigo-600 transition-all">
                                            <div>
                                                <h4 className="font-black text-2xl text-slate-900 mb-4 tracking-tight">{s.name}</h4>
                                                <div className="flex gap-2">
                                                    <span className="text-[10px] font-black bg-slate-900 text-white px-5 py-2 rounded-xl uppercase tracking-widest shadow-sm">{s.grade}</span>
                                                    <span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-5 py-2 rounded-xl uppercase tracking-widest border border-indigo-100">{s.diagnosis}</span>
                                                </div>
                                            </div>
                                            <div className="w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-200 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-inner">
                                                <i data-lucide="file-search" className="w-6 h-6"></i>
                                            </div>
                                        </div>
                                    ))}
                                    {students.length === 0 && (
                                        <div className="col-span-full py-40 text-center border-4 border-dashed border-slate-100 rounded-[5rem] bg-white/40">
                                            <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-200">
                                                <i data-lucide="cloud-off" className="w-10 h-10"></i>
                                            </div>
                                            <p className="text-slate-300 font-bold italic text-xl">Sin registros sincronizados</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[4rem] w-full max-w-xl p-14 shadow-2xl animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-12">
                                    <h3 className="text-4xl font-black text-slate-900 tracking-tighter italic">Alta de Alumno</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center text-slate-400 hover:bg-rose-500 hover:text-white transition-all"><i data-lucide="x"></i></button>
                                </div>
                                <form className="space-y-8" onSubmit={(e) => {
                                    e.preventDefault();
                                    const data = {
                                        name: e.target.name.value,
                                        grade: e.target.grade.value,
                                        diagnosis: e.target.diag.value,
                                        createdAt: new Date().toISOString()
                                    };
                                    
                                    if (!isDemoMode && window.FB && user) {
                                        const db = window.FB.getFirestore();
                                        window.FB.addDoc(window.FB.collection(db, "students"), data);
                                    } else {
                                        setStudents([{id: Date.now(), ...data}, ...students]);
                                    }
                                    setIsModalOpen(false);
                                }}>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 italic">Nombre Completo</label>
                                        <input name="name" required className="w-full p-6 bg-slate-50 border border-slate-100 rounded-3xl outline-none focus:ring-4 ring-indigo-50 font-bold text-lg transition-all" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 italic">Grado / Sección</label>
                                            <input name="grade" required className="w-full p-6 bg-slate-50 border border-slate-100 rounded-3xl outline-none focus:ring-4 ring-indigo-50 font-bold transition-all" />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 italic">Diagnóstico Principal</label>
                                            <input name="diag" required className="w-full p-6 bg-slate-50 border border-slate-100 rounded-3xl outline-none focus:ring-4 ring-indigo-50 font-bold transition-all" />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-8 rounded-[2.5rem] font-black text-xl shadow-2xl shadow-indigo-100 hover:bg-indigo-700 hover:scale-[1.02] transition-all uppercase tracking-widest mt-6">
                                        Confirmar Registro
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
